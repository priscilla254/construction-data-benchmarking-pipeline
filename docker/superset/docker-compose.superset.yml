services:
  superset:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superset-app
    env_file:
      - .env
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: ["/bin/sh", "/app/bootstrap.sh", "web"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 90s

  superset-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superset-worker
    env_file:
      - .env
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: ["/bin/sh", "/app/bootstrap.sh", "worker"]
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f 'celery worker' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: superset-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    container_name: superset-postgres
    environment:
      POSTGRES_DB: ${SUPERSET_DB_NAME:-superset}
      POSTGRES_USER: ${SUPERSET_DB_USER:-superset}
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset}
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${SUPERSET_DB_USER:-superset} -d ${SUPERSET_DB_NAME:-superset}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  superset_home:
  superset_db_data:
